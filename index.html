<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureHealth - Smart Health Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Css -->
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-50 text-slate-800 overflow-x-hidden">

    <header class="w-full bg-white">
        <div class="bg-[#0066FF] text-white text-xs py-2 px-4 md:px-12 flex flex-col sm:flex-row justify-between items-center gap-2">
            <div class="flex items-center gap-6">
                <span><i class="fa-solid fa-phone mr-1.5"></i> +1 (123) 456-7890</span>
                <span><i class="fa-solid fa-envelope mr-1.5"></i> hello@purehealth.com</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="mr-2">Follow us:</span>
                <a href="#" class="hover:text-blue-200"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="hover:text-blue-200"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" class="hover:text-blue-200"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#" class="hover:text-blue-200"><i class="fa-brands fa-instagram"></i></a>
                <span class="ml-2 border-l border-blue-400 pl-4"><i class="fa-solid fa-globe mr-1"></i> EN <i class="fa-solid fa-chevron-down text-[10px]"></i></span>
            </div>
        </div>
    </header>
  <!--=========================
        Hero Section Start
  =============================-->
  <section class="relative overflow-hidden pt-12 lg:pt-0 bg-[linear-gradient(360deg,_rgba(11,130,157,0.0513)_0%,_rgba(21,93,252,0.038)_60.1%)] ;
;
]">
      <div class="max-w-7xl mx-auto px-6 md:px-12 grid lg:grid-cols-12 items-center min-h-[600px]">
          <div class="lg:col-span-6 z-10 space-y-6 pb-12 lg:pb-0">
              <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider">
                  Health comes first
              </span>
              <h1 class="text-4xl md:text-5xl lg:text-6xl font-black text-slate-900 leading-tight">
                  Smart Health <br>
                  <span class="text-[#0066FF] relative">
                      Solutions
                      <span class="absolute left-0 bottom-1 w-full h-[6px] bg-emerald-400 -z-10 opacity-60 rounded"></span>
                  </span>
              </h1>
              <p class="text-slate-500 text-base max-w-lg leading-relaxed">
                  Book virtual consultations with top specialists in minutes. We put your health first. Book your appointment now and get instant assistance.
              </p>
              <div class="flex flex-wrap items-center gap-4 pt-2">
                  <a href="#" class="bg-[#0066FF] text-white px-8 py-3.5 rounded-full font-semibold shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition flex items-center gap-2">
                      <i class="fa-solid fa-magnifying-glass"></i> Find a Doctor
                  </a>
                  <a href="#" class="border-2 border-slate-200 text-slate-700 px-8 py-3.5 rounded-full font-semibold hover:bg-slate-50 transition flex items-center gap-2">
                      <i class="fa-solid fa-phone-flip text-red-500"></i> Emergency Help
                  </a>
              </div>
          </div>

          <div class="lg:col-span-6 relative flex justify-center items-end h-full">
              <div class="absolute right-0 bottom-0 w-[80%] h-[80%] bg-blue-50 rounded-tl-[100px] rounded-br-[100px] -z-10"></div>
              <img src="./image/hero-right-image.png"
                    alt="Doctor"
                    class="w-[85%] object-cover object-top max-h-[550px] drop-shadow-2xl mix-blend-multiply rounded-b-3xl">
          </div>
      </div>
  </section>
  <!--=========================
        Hero Section End
  =============================-->
  <hr class="border-gray-200">
</body>
</html>
